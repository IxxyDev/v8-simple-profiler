name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded pending a vitest bump: vitest 1.x's vite-node loader
        # mishandles file:// URLs on Windows when production code does dynamic
        # import (load-benchmarks.js / child-runner.js). The CLI itself runs
        # fine on Windows under plain node; only the test runner is affected.
        os: [ubuntu-latest, macos-latest]
        node: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
